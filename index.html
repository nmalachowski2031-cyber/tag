<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #0f172a);
      font-family: Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.15), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,.12), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(34,197,94,.10), transparent 25%),
        #0b1020;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
    }
    button.secondary { background: #334155; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+</h1>
      <div>Use WASD or Arrow Keys to move.</div>
      <div>Either side can be tagger. Tag the other to switch.</div>
      <div style="margin-top:10px;">Press Enter or Space to start.</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button class="secondary" id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const centerMsg = document.getElementById('centerMsg');
    const restartBtn = document.getElementById('restartBtn');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;

    // Speeds
    const playerBase   = 5.0;
    const botBase      = 3.8;
    const taggerBoost  = 1.25; // tagger is 25% faster

    const player = {
      x: 0,
      y: 0,
      r: 16,
      base: playerBase,
      color: '#22c55e',
      frozen: false
    };

    const bot = {
      x: 0,
      y: 0,
      r: 16,
      base: botBase,
      color: '#ef4444',
      frozen: false
    };

    let tagCountdown       = 0; // 3→2→1
    let tagCountdownElapsed = 0;
    let tagger             = null; // "player" or "bot"

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      gameOver = false;
      player.x = window.innerWidth * 0.25;
      player.y = window.innerHeight * 0.5;
      bot.x = window.innerWidth * 0.75;
      bot.y = window.innerHeight * 0.5;
      tagCountdown = 0;
      tagCountdownElapsed = 0;
      tagger = 'bot'; // bot starts as tagger
      setTagger();
      player.frozen = false;
      bot.frozen    = false;
      centerMsg.style.display = running ? 'none' : 'grid';
      updateUI();
    }

    function setTagger() {
      if (tagger === 'player') {
        player.color = '#f59e0b';
        bot.color    = '#ef4444';
        player.speed = player.base * taggerBoost;
        bot.speed    = bot.base;
      } else {
        player.color = '#22c55e';
        bot.color    = '#f59e0b';
        player.speed = player.base;
        bot.speed    = bot.base * taggerBoost;
      }
    }

    function startGame() {
      if (running || gameOver) return;
      running = true;
      resetGame();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${Math.max(0, timer)}`;
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function keepInBounds(obj) {
      obj.x = Math.max(obj.r, Math.min(window.innerWidth - obj.r, obj.x));
      obj.y = Math.max(obj.r, Math.min(window.innerHeight - obj.r, obj.y));
    }

    function drawArena() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      const grid = 48;
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#93c5fd';
      ctx.lineWidth = 1;
      for (let x = 0; x < window.innerWidth; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, window.innerHeight);
        ctx.stroke();
      }
      for (let y = 0; y < window.innerHeight; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(window.innerWidth, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawCircle(obj, label, glow) {
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(label, obj.x, obj.y - obj.r - 10);
      ctx.restore();
    }

    function drawFloatingText(obj, text, color = 'white') {
      const y = obj.y - obj.r - 26;
      if (y < 20) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(text, obj.x, y);
      ctx.restore();
    }

    function drawTaggerLabel(obj, isTagger) {
      if (!isTagger) return;
      if (tagCountdown > 0 && tagCountdown < 4) {
        const elapsed = (now - tagCountdownElapsed) / 1000;
        if (elapsed >= 1) {
          tagCountdown = Math.max(0, tagCountdown - 1);
          if (tagCountdown === 0) {
            taggerScore = 0;
          } else {
            tagCountdownElapsed = now;
          }
        }
        drawFloatingText(obj, `${tagCountdown}`, '#f59e0b');
      }
    }

    function drawHudText() {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = '700 18px Arial';
      ctx.textAlign = 'left';
      const label = tagger === 'player' ? 'YOU ARE TAGGER' : 'BOT IS TAGGER';
      ctx.fillText(label, 18, 64);
      ctx.font = '14px Arial';
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillText('Tag the other player to switch tagger.', 18, 86);
    }

    // PLAYER MOVEMENT (survivor can move during 3→2→1)
    const moveSmooth = { x: 0, y: 0 };
    const moveTarget = { x: 0, y: 0 };

    function updatePlayer() {
      if (player.frozen) return;

      moveTarget.x = 0;
      moveTarget.y = 0;
      if (keys['ArrowLeft'] || keys['a']) moveTarget.x -= 1;
      if (keys['ArrowRight'] || keys['d']) moveTarget.x += 1;
      if (keys['ArrowUp'] || keys['w']) moveTarget.y -= 1;
      if (keys['ArrowDown'] || keys['s']) moveTarget.y += 1;

      const moveDiffX = moveTarget.x - moveSmooth.x;
      const moveDiffY = moveTarget.y - moveSmooth.y;
      moveSmooth.x += moveDiffX * 0.25;
      moveSmooth.y += moveDiffY * 0.25;

      const len = Math.hypot(moveSmooth.x, moveSmooth.y) || 1;
      player.x += (moveSmooth.x / len) * player.speed;
      player.y += (moveSmooth.y / len) * player.speed;
      keepInBounds(player);
    }

    // BOT MOVEMENT – frozen during 3→2→1 when tagger
    const lookTarget = { angle: 0 };
    const lookSmooth = { angle: 0 };

    function updateBot() {
      if (bot.frozen) return;

      const towardPlayer = Math.atan2(player.y - bot.y, player.x - bot.x);
      let angle = towardPlayer;

      if (tagger === 'player') {
        // bot runs away when player is tagger
        angle += Math.PI;
      }
      lookTarget.angle = angle;

      let diff = lookTarget.angle - lookSmooth.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      lookSmooth.angle += diff * 0.15;

      bot.x += Math.cos(lookSmooth.angle) * bot.speed;
      bot.y += Math.sin(lookSmooth.angle) * bot.speed;

      keepInBounds(bot);

      const oldX = bot.x, oldY = bot.y;
      if (Math.abs(bot.x - oldX) < 0.2 && Math.abs(bot.y - oldY) < 0.2) {
        bot.y += (Math.random() < 0.5 ? 1 : -1) * bot.speed;
        keepInBounds(bot);
      }
    }

    function handleTagging() {
      // Skip tagging if tagger is in 3→2→1 freeze
      if (tagCountdown > 0 && tagCountdown < 4) return;

      if (dist(player, bot) < player.r + bot.r) {
        if (tagger === 'bot') {
          // bot tags player
          tagger = 'player';
          taggerScore += 1;
          score = 0;
          tagCountdown = 3;
          tagCountdownElapsed = now;
        } else if (tagger === 'player') {
          // player tags bot
          tagger = 'bot';
          score += 1;
          taggerScore = 0;
          tagCountdown = 0;
        }
        setTagger();
      }
    }

    function loop(time) {
      now = time;
      if (!running) return;
      const dt = now - lastTime;
      lastTime = now;

      if (!gameOver) {
        if (lastSecondTick === 0) lastSecondTick = now;
        if (now - lastSecondTick >= 1000) {
          timer = Math.max(0, timer - 1);
          lastSecondTick += 1000;
          if (timer === 0) {
            gameOver = true;
            centerMsg.style.display = 'grid';
            centerMsg.querySelector('.box').innerHTML = `
              <h1 style="margin:0 0 8px;">Game Over</h1>
              <div>Final score: ${score}</div>
              <div>Tags held: ${taggerScore}</div>
              <div style="margin-top:10px;">Press Enter or Space to replay.</div>
            `;
          }
          updateUI();
        }

        // During 3→2→1, tagger is frozen, survivor moves
        if (tagCountdown > 0 && tagCountdown < 4) {
          if (tagger === 'bot') {
            bot.frozen = true;
          } else {  // tagger === player
            player.frozen = true;
          }
        } else {
          bot.frozen    = false;
          player.frozen = false;
        }

        updatePlayer();
        updateBot();
        handleTagging();
      }

      drawArena();
      const botLabel = tagger === 'bot' ? 'BOT (TAGGER)' : 'BOT';
      const playerLabel = tagger === 'player' ? 'YOU (TAGGER)' : 'YOU';
      drawCircle(bot, botLabel, tagger === 'bot' ? 'rgba(245,158,11,.55)' : 'rgba(239,68,68,.55)');
      drawCircle(player, playerLabel, tagger === 'player' ? 'rgba(245,158,11,.55)' : 'rgba(34,197,94,.55)');
      drawTaggerLabel(tagger === 'player' ? player : bot, true);
      drawHudText();

      requestAnimationFrame(loop);
    }

    // Start on Enter or Space
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['Enter', ' '].includes(e.key) && !running && !gameOver) {
        e.preventDefault();
        startGame();
        return;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    restartBtn.addEventListener('click', () => {
      timer = 60;
      gameOver = false;
      centerMsg.querySelector('.box').innerHTML = `
        <h1 style="margin:0 0 8px;">TAG on G+</h1>
        <div>Use WASD or Arrow Keys to move.</div>
        <div>Either side can be tagger. Tag the other to switch.</div>
        <div style="margin-top:10px;">Press Enter or Space to start.</div>
      `;
      resetGame();
    });

    window.addEventListener('resize', () => {
      resize();
      if (player.x ||    window.addEventListener('resize', () => {
      resize();
      if (player.x || player.y) {
        keepInBounds(player);
        keepInBounds(bot);
      }
    });

    resize();
    resetGame();
  </script>
</body>
</html>
