<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TAG on G+</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: linear-gradient(180deg, #111827, #0f172a);
  font-family: Arial, sans-serif;
  user-select: none;
  touch-action: none;
}
#ui {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 12px;
  color: white;
  z-index: 10;
  pointer-events: none;
  font-weight: 700;
}
.panel {
  background: rgba(15, 23, 42, 0.7);
  border-radius: 14px;
  padding: 10px 14px;
}
#game {
  display: block;
  width: 100vw;
  height: 100vh;
}
#centerMsg {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  color: white;
  z-index: 12;
  text-align: center;
}
.box {
  background: rgba(15, 23, 42, 0.75);
  border-radius: 18px;
  padding: 18px 22px;
}
.btnRow {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 18px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
button {
  border: 0;
  border-radius: 14px;
  padding: 12px 16px;
  background: #2563eb;
  color: white;
  font-weight: 700;
  cursor: pointer;
}
button.secondary { background: #334155; }
</style>
</head>
<body>

<div id="ui">
  <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
  <div class="panel" id="timeBox">Time: 60</div>
</div>

<div id="centerMsg">
  <div class="box">
    <h1>TAG on G+</h1>
    <div>Press Start to play.</div>
  </div>
</div>

<canvas id="game"></canvas>

<div class="btnRow">
  <button id="startBtn">Start</button>
  <button class="secondary" id="restartBtn">Restart</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreBox = document.getElementById('scoreBox');
const timeBox = document.getElementById('timeBox');
const centerMsg = document.getElementById('centerMsg');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

let running = false;
let player = { x: 100, y: 100, r: 16 };
let bot = { x: 300, y: 200, r: 16 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

function resetGame() {
  player.x = 100;
  player.y = 100;
  bot.x = 300;
  bot.y = 200;
}

function startGame() {
  running = true;
  centerMsg.style.display = 'none';
  resetGame();
  requestAnimationFrame(loop);
}

function drawCircle(obj, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCircle(player, 'lime');
  drawCircle(bot, 'red');

  // ✅ FIXED LINE (was broken before)
  drawTaggerLabel(player, true);
  drawHudText();

  requestAnimationFrame(loop);
}

function drawTaggerLabel(obj, isTagger) {
  if (!isTagger) return;
  ctx.fillStyle = 'yellow';
  ctx.fillText("TAGGER", obj.x, obj.y - 20);
}

function drawHudText() {
  ctx.fillStyle = 'white';
  ctx.fillText("Game Running", 20, 40);
}

startBtn.addEventListener('click', () => {
  if (!running) startGame();
});

restartBtn.addEventListener('click', () => {
  running = false;
  centerMsg.style.display = 'grid';
  resetGame();
});
</script>

</body>
</html>
