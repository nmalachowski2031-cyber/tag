<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #0f172a);
      font-family: Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.15), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,.12), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(34,197,94,.10), transparent 25%),
        #0b1020;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
    button:hover { box-shadow: 0 12px 28px rgba(37,99,235,.35); }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+</h1>
      <div>Use WASD or Arrow Keys to move.</div>
      <div>Either side can be tagger. Tag the other to switch.</div>
      <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn">START</button>
    <button class="secondary" id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const centerMsg = document.getElementById('centerMsg');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;

    // Speeds
    const playerBase   = 5.0;
    const botBase      = 3.8;
    const taggerBoost  = 1.25;

    const player = {
      x: 0, y: 0, r: 16,
      base: playerBase,
      speed: playerBase,
      color: '#22c55e',
      frozen: false
    };

    const bot = {
      x: 0, y: 0, r: 16,
      base: botBase,
      speed: botBase,
      color: '#ef4444',
      frozen: false
    };

    let tagCountdown = 0;
    let tagCountdownElapsed = 0;
    let tagger = null;

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      gameOver = false;
      player.x = window.innerWidth * 0.25;
      player.y = window.innerHeight * 0.5;
      bot.x = window.innerWidth * 0.75;
      bot.y = window.innerHeight * 0.5;
      tagCountdown = 0;
      tagCountdownElapsed = 0;
      tagger = 'bot';
      setTagger();
      player.frozen = false;
      bot.frozen = false;
      centerMsg.style.display = running ? 'none' : 'grid';
      if (!running) {
        centerMsg.querySelector('.box').innerHTML = `
          <h1 style="margin:0 0 8px;">TAG on G+</h1>
          <div>Use WASD or Arrow Keys to move.</div>
          <div>Either side can be tagger. Tag the other to switch.</div>
          <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
        `;
      }
      updateUI();
    }

    function setTagger() {
      if (tagger === 'player') {
        player.color = '#f59e0b';
        bot.color = '#ef4444';
        player.speed = player.base * taggerBoost;
        bot.speed = bot.base;
      } else {
        player.color = '#22c55e';
        bot.color = '#f59e0b';
        player.speed = player.base;
        bot.speed = bot.base * taggerBoost;
      }
    }

    function startGame() {
      if (running || gameOver) return;
      running = true;
      centerMsg.style.display = 'none';
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${Math.max(0, timer)}`;
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function keepInBounds(obj) {
      obj.x = Math.max(obj.r, Math.min(window.innerWidth - obj.r, obj.x));
      obj.y = Math.max(obj.r, Math.min(window.innerHeight - obj.r, obj.y));
    }

    function drawArena() {
      ctx.clearRect(0, 0, W, H);
      const grid = 48;
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#93c5fd';
      ctx.lineWidth = 1;
      for (let x = 0; x < window.innerWidth; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, window.innerHeight);
        ctx.stroke();
      }
      for (let y = 0; y < window.innerHeight; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(window.innerWidth, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawCircle(obj, label, glow) {
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, obj.x, obj.y + 5);
      ctx.restore();
    }

    function drawFloatingText(obj, text, color = 'white') {
      const y = obj.y - obj.r - 26;
      if (y < 20) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, obj.x, y);
      ctx.restore();
    }

    function drawTaggerLabel(obj) {
      if (tagCountdown > 0 && tagCountdown < 4) {
        const elapsed = (now - tagCountdownElapsed) / 1000;
        if (elapsed >= 1) {
          tagCountdown--;
          tagCountdownElapsed = now;
          if (tagCountdown === 0) taggerScore = 0;
        }
        drawFloatingText(obj, tagCountdown, '#f59e0b');
      }
    }

    function drawHudText() {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = '700 18px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const label = tagger === 'player' ? 'YOU ARE TAGGER' : 'BOT IS TAGGER';
      ctx.fillText(label, 18, 64);
      ctx.font = '14px Arial';
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillText('Tag the other player to switch tagger.', 18, 86);
    }

    const moveSmooth = { x: 0, y: 0 };

    function updatePlayer() {
      if (player.frozen) return;
      let tx = 0, ty = 0;
      if (keys['ArrowLeft'] || keys['a']) tx -= 1;
      if (keys['ArrowRight'] || keys['d']) tx += 1;
      if (keys['ArrowUp'] || keys['w']) ty -= 1;
      if (keys['ArrowDown'] || keys['s']) ty += 1;
      const len = Math.hypot(tx, ty) || 1;
      player.x += (tx / len) * player.speed;
      player.y += (ty / len) * player.speed;
      keepInBounds(player);
    }

    const lookSmooth = { angle: 0 };

    function updateBot() {
      if (bot.frozen) return;
      let angle = Math.atan2(player.y - bot.y, player.x - bot.x);
      if (tagger === 'player') angle += Math.PI;
      let diff = angle - lookSmooth.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      lookSmooth.angle += diff * 0.15;
      bot.x += Math.cos(lookSmooth.angle) * bot.speed;
      bot.y += Math.sin(lookSmooth.angle) * bot.speed;
      keepInBounds(bot);
    }

    function handleTagging() {
      if (tagCountdown > 0 && tagCountdown < 4) return;
      if (dist(player, bot) < player.r + bot.r) {
        if (tagger === 'bot') {
          tagger = 'player';
          taggerScore++;
          score = 0;
          tagCountdown = 3;
        } else {
          tagger = 'bot';
          score++;
          taggerScore = 0;
        }
        tagCountdownElapsed = now;
        setTagger();
      }
    }

    function loop(time) {
      now = time;
      if (!running) return;
      const dt = now - lastTime;
      lastTime = now;

      if (!gameOver) {
        if (now - lastSecondTick >= 1000) {
          timer--;
          lastSecondTick = now;
          if (timer <= 0) {
            gameOver = true;
            centerMsg.style.display = 'grid';
            centerMsg.querySelector('.box').innerHTML = `
              <h1 style="margin:0 0 8px;">Game Over</h1>
              <div>Final score: ${score}</div>
              <div>Tags held: ${taggerScore}</div>
              <div style="margin-top:10px;">Press START or Restart.</div>
            `;
          }
          updateUI();
        }

        // Freeze only tagger during countdown
        const isCountdown = tagCountdown > 0 && tagCountdown < 4;
        player.frozen = isCountdown && tagger === 'player';
        bot.frozen = isCountdown && tagger === 'bot';

        updatePlayer();
        updateBot();
        handleTagging();
      }

      drawArena();
      drawCircle(bot, 'BOT', tagger === 'bot' ? 'rgba(245,158,11,.55)' : 'rgba(239,68,68,.55)');
      drawCircle(player, 'YOU', tagger === 'player' ? 'rgba(245,158,11,.55)' : 'rgba(34,197,94,.55)');
      if (tagger === 'player') drawTaggerLabel(player);
      else drawTaggerLabel(bot);
      drawHudText();

      requestAnimationFrame(loop);
    }

    // Event listeners
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      running = false;
      gameOver = false;
      resetGame();
    });

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['Enter', ' '].includes(e.key) && !running && !gameOver) {
        e.preventDefault();
        startGame();
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    window.addEventListener('resize', () => {
      resize();
      if (player.x || player.y) {
        keepInBounds(player);
        keepInBounds(bot);
      }
    });

    resize();
    resetGame();
    lastSecondTick = performance.now();
  </script>
</body>
</html>
