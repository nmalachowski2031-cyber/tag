<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+ 🏰 MAZE</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2f6b2f 0%, #1e4621 100%);
      font-family: 'Arial Black', Arial, sans-serif;
      user-select: none;
    }

    /* MAIN MENU */
    #mainMenu {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 25;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
    }
    .menuBox {
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(245,158,11,0.3);
    }
    .menuTitle {
      color: #f59e0b;
      font-size: 36px;
      margin: 0 0 24px;
      text-shadow: 0 0 20px rgba(245,158,11,0.8);
      letter-spacing: 2px;
    }
    .menuBtn {
      display: block;
      width: 280px;
      margin: 16px auto;
      padding: 18px 24px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    }
    .mainBtn { background: linear-gradient(45deg, #10b981, #34d399); color: white; }
    .mainBtn:hover { 
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(16,185,129,0.6);
    }
    .player2Btn { 
      background: linear-gradient(45deg, #6b7280, #9ca3af); 
      color: white;
      opacity: 0.7;
    }
    .player2Btn:hover { 
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* GAME UI (same as before) */
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 15;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #staminaPanel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #staminaBar {
      width: 120px;
      height: 8px;
      background: rgba(30, 58, 138, 0.8);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
    }
    #staminaFill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 100%;
      transition: width 0.1s ease;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #2f6b2f;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 20;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
    button:hover { box-shadow: 0 12px 28px rgba(37,99,235,.35); }
    button:focus {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <!-- ✅ MAIN MENU -->
  <div id="mainMenu">
    <div class="menuBox">
      <h1 class="menuTitle">TAG on G+ 🏰</h1>
      <p style="color: #94a3b8; margin: 0 0 32px; font-size: 16px;">Choose your game mode</p>
      
      <button class="menuBtn mainBtn" id="mainBtn">MAIN (1P vs AI)</button>
      <button class="menuBtn player2Btn" id="player2Btn" disabled>2 PLAYER (COMING SOON)</button>
      
      <p style="color: #64748b; margin-top: 24px; font-size: 12px;">
        Press 1 = MAIN | Press 2 = 2P
      </p>
    </div>
  </div>

  <!-- GAME UI -->
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
    <div class="panel" id="staminaPanel">
      <div style="font-size: 11px; opacity: 0.9;">Stamina</div>
      <div id="staminaBar">
        <div id="staminaFill"></div>
      </div>
    </div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+ 🏰 MAZE</h1>
      <div>🔥 BETTER MAZE - wider paths + smart loops!</div>
      <div>Use WASD + Shift to sprint (stamina).</div>
      <div>Tag to switch roles. Outsmart the bot!</div>
      <div style="margin-top:10px;">Press Enter/Space or START</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn" tabindex="0">START</button>
    <button class="secondary" id="restartBtn" tabindex="0" style="display: none;">RESTART</button>
  </div>

  <script>
    // MENU LOGIC
    const mainMenu = document.getElementById('mainMenu');
    const mainBtn = document.getElementById('mainBtn');
    const player2Btn = document.getElementById('player2Btn');
    const centerMsg = document.getElementById('centerMsg');
    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let gameMode = null; // 'main' or 'player2'

    mainBtn.onclick = () => {
      gameMode = 'main';
      mainMenu.style.display = 'none';
      ui.style.display = 'flex';
      centerMsg.style.display = 'grid';
      startBtn.style.display = 'inline-flex';
    };

    player2Btn.onclick = () => {
      alert('🛠️ 2 Player mode coming soon!\n\nPress MAIN for 1P vs AI');
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (mainMenu.style.display !== 'none') {
        if (e.key === '1') {
          mainBtn.click();
          e.preventDefault();
        }
        if (e.key === '2') {
          player2Btn.click();
          e.preventDefault();
        }
      }
    });

    // ✅ YOUR FULL GAME CODE HERE (same as before)
    // ... [insert all your maze game logic, walls, player/bot, loop, etc.]
    
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const staminaFill = document.getElementById('staminaFill');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;
    let loopStarted = false;

    // [ALL YOUR ORIGINAL GAME VARIABLES AND FUNCTIONS HERE - unchanged]
    // ... player, bot, walls, makeWalls(), resize(), loop(), etc. ...

    startBtn.onclick = startGame;
    restartBtn.onclick = () => {
      running = false;
      gameOver = false;
      loopStarted = false;
      resetGame();
      centerMsg.style.display = 'grid';
      startBtn.style.display = 'inline-flex';
      restartBtn.style.display = 'none';
    };

    // Init
    resize();
    resetGame();
  </script>
</body>
</html>
