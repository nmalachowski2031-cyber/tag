<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2f6b2f;
      font-family: Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #staminaPanel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #staminaBar {
      width: 120px;
      height: 8px;
      background: rgba(30, 58, 138, 0.8);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
    }
    #staminaFill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 100%;
      transition: width 0.1s ease;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #2f6b2f;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
    button:hover { box-shadow: 0 12px 28px rgba(37,99,235,.35); }
    button:focus {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
    <div class="panel" id="staminaPanel">
      <div style="font-size: 11px; opacity: 0.9;">Stamina</div>
      <div id="staminaBar">
        <div id="staminaFill"></div>
      </div>
    </div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+</h1>
      <div>Use WASD + Shift to sprint (uses stamina).</div>
      <div>Either side can be tagger. Tag the other to switch.</div>
      <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn" tabindex="0">START</button>
    <button class="secondary" id="restartBtn" tabindex="0">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const staminaFill = document.getElementById('staminaFill');
    const centerMsg = document.getElementById('centerMsg');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;

    const playerBase = 4.5;
    const botBase = 3.8;
    const playerTaggerBoost = 1.25;
    const botTaggerBoost = 1.65;
    const sprintMultiplier = 1.8;
    const maxStamina = 100;
    const staminaDrainRate = 80;  // Increased for more visible drain
    const staminaRegenRate = 40;  // Increased for more visible regen
    let stamina = maxStamina;

    const player = { x: 0, y: 0, r: 16, base: playerBase, speed: playerBase, color: '#22c55e', frozen: false };
    const bot = { x: 0, y: 0, r: 16, base: botBase, speed: botBase, color: '#ef4444', frozen: false, vx: 0, vy: 0 };

    let walls = [];

    let tagCountdown = 0;
    let tagCountdownElapsed = 0;
    let tagger = 'bot';

    let pathTarget = { x: 0, y: 0 };
    let lastPathTime = 0;
    let stuckCounter = 0;
    let prevBotPos = { x: 0, y: 0 };

    const PATH_UPDATE_MS = 300;
    const LOOKAHEAD_DIST = 80;
    const STUCK_THRESHOLD = 10;

    function wallPx(x, y, w, h) {
      return { x: x * W, y: y * H, w: w * W, h: h * H };
    }

    function makeWalls() {
      walls = [
        // Left section - longer vertical walls
        wallPx(0.285, 0.00, 0.022, 0.32),
        wallPx(0.285, 0.12, 0.240, 0.022),
        wallPx(0.475, 0.00, 0.022, 0.22),
        wallPx(0.355, 0.04, 0.095, 0.022),

        // Middle-left section
        wallPx(0.685, 0.00, 0.022, 0.22),
        wallPx(0.565, 0.11, 0.195, 0.022),
        wallPx(0.515, 0.05, 0.022, 0.22),

        // Right section
        wallPx(0.945, 0.00, 0.022, 0.22),
        wallPx(0.885, 0.11, 0.145, 0.022),
        wallPx(0.875, 0.00, 0.022, 0.08),

        // Middle section
        wallPx(0.105, 0.19, 0.235, 0.022),
        wallPx(0.325, 0.30, 0.215, 0.022),
        wallPx(0.425, 0.19, 0.022, 0.22),

        // Middle-right section
        wallPx(0.605, 0.24, 0.175, 0.022),
        wallPx(0.705, 0.24, 0.022, 0.20),
        wallPx(0.705, 0.42, 0.125, 0.022),
        wallPx(0.935, 0.22, 0.022, 0.20),

        // Lower middle section
        wallPx(0.195, 0.50, 0.215, 0.022),
        wallPx(0.285, 0.43, 0.022, 0.18),
        wallPx(0.355, 0.43, 0.022, 0.15),
        wallPx(0.355, 0.55, 0.195, 0.022),

        // Lower right section
        wallPx(0.750, 0.47, 0.022, 0.20),
        wallPx(0.815, 0.55, 0.155, 0.022),

        // Bottom section
        wallPx(0.000, 0.68, 0.125, 0.022),
        wallPx(0.145, 0.64, 0.022, 0.20),
        wallPx(0.245, 0.76, 0.135, 0.022),
        wallPx(0.285, 0.64, 0.022, 0.20)
      ];

      walls.forEach(w => {
        w.x = Math.max(0, Math.min(W - w.w, w.x));
        w.y = Math.max(0, Math.min(H - w.h, w.y));
      });
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      makeWalls();
      if (!running) resetPositions();
    }

    function circleRectCollide(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function isPositionSafe(x, y, r = 16) {
      const test = { x, y, r };
      for (const wall of walls) {
        if (circleRectCollide(test, wall)) return false;
      }
      return x >= r && y >= r && x <= W - r && y <= H - r;
    }

    function findSafeSpawn(preferredX, preferredY, r = 16) {
      const points = [
        [preferredX, preferredY],
        [W * 0.12, H * 0.58],
        [W * 0.17, H * 0.26],
        [W * 0.16, H * 0.85],
        [W * 0.44, H * 0.78],
        [W * 0.70, H * 0.22],
        [W * 0.91, H * 0.16],
        [W * 0.92, H * 0.52],
        [W * 0.92, H * 0.86]
      ];
      for (const [x, y] of points) {
        if (isPositionSafe(x, y, r)) return { x, y };
      }
      for (let i = 0; i < 5000; i++) {
        const x = r + Math.random() * (W - r * 2);
        const y = r + Math.random() * (H - r * 2);
        if (isPositionSafe(x, y, r)) return { x, y };
      }
      return { x: Math.max(r, Math.min(W - r, preferredX)), y: Math.max(r, Math.min(H - r, preferredY)) };
    }

    function moveWithWalls(obj, dx, dy) {
      obj.x += dx;
      for (const wall of walls) {
        if (circleRectCollide(obj, wall)) { obj.x -= dx; break; }
      }
      obj.y += dy;
      for (const wall of walls) {
        if (circleRectCollide(obj, wall)) { obj.y -= dy; break; }
      }
      obj.x = Math.max(obj.r, Math.min(W - obj.r, obj.x));
      obj.y = Math.max(obj.r, Math.min(H - obj.r, obj.y));
    }

    function getBestDirection(targetX, targetY) {
      const dirs = [
        {dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1},
        {dx: 0.7, dy: 0.7}, {dx: 0.7, dy: -0.7}, {dx: -0.7, dy: 0.7}, {dx: -0.7, dy: -0.7}
      ];
      let bestDir = dirs[0];
      let bestScore = -Infinity;
      for (const dir of dirs) {
        const testX = bot.x + dir.dx * LOOKAHEAD_DIST;
        const testY = bot.y + dir.dy * LOOKAHEAD_DIST;
        if (isPositionSafe(testX, testY, bot.r)) {
          const distToTarget = Math.hypot(testX - targetX, testY - targetY);
          const score = -distToTarget;
          if (score > bestScore) {
            bestScore = score;
            bestDir = dir;
          }
        }
      }
      return bestDir;
    }

    function updateBotTarget() {
      if (tagger === 'bot') {
        pathTarget.x = player.x;
        pathTarget.y = player.y;
      } else {
        const fleeX = bot.x + (bot.x - player.x) * 0.8;
        const fleeY = bot.y + (bot.y - player.y) * 0.8;
        pathTarget.x = Math.max(bot.r, Math.min(W - bot.r, fleeX));
        pathTarget.y = Math.max(bot.r, Math.min(H - bot.r, fleeY));
      }
    }

    function setTagger() {
      if (tagger === 'player') {
        player.color = '#f59e0b';
        bot.color = '#ef4444';
        player.speed = player.base * playerTaggerBoost;
        bot.speed = bot.base;
      } else {
        player.color = '#22c55e';
        bot.color = '#f59e0b';
        player.speed = player.base;
        bot.speed = bot.base * botTaggerBoost;
      }
    }

    function resetPositions() {
      const p = findSafeSpawn(W * 0.12, H * 0.58, player.r);
      const b = findSafeSpawn(W * 0.90, H * 0.86, bot.r);
      player.x = p.x;
      player.y = p.y;
      bot.x = b.x;
      bot.y = b.y;

      if (Math.hypot(player.x - bot.x, player.y - bot.y) < player.r + bot.r + 80) {
        const alt = findSafeSpawn(W * 0.92, H * 0.16, bot.r);
        bot.x = alt.x;
        bot.y = alt.y;
      }

      if (!isPositionSafe(bot.x, bot.y, bot.r)) {
        for (let i = 0; i < 5000; i++) {
          const x = bot.r + Math.random() * (W - bot.r * 2);
          const y = bot.r + Math.random() * (H - bot.r * 2);
          if (isPositionSafe(x, y, bot.r)) {
            bot.x = x;
            bot.y = y;
            break;
          }
        }
      }

      prevBotPos = { x: bot.x, y: bot.y };
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      gameOver = false;
      stamina = maxStamina;
      tagCountdown = 0;
      tagCountdownElapsed = 0;
      tagger = 'bot';
      player.frozen = false;
      bot.frozen = false;
      bot.vx = 0;
      bot.vy = 0;
      pathTarget = { x: 0, y: 0 };
      lastPathTime = 0;
      stuckCounter = 0;
      resetPositions();
      setTagger();
      updateUI();
    }

    function startGame() {
      if (running || gameOver) return;
      running = true;
      centerMsg.style.display = 'none';
      startBtn.style.display = 'none';
      restartBtn.style.display = 'inline-flex';
      lastTime = performance.now();
      lastSecondTick = lastTime;
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${Math.max(0, timer)}`;
      staminaFill.style.width = (stamina / maxStamina * 100) + '%';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function updateStamina(deltaTime) {
      const dt = Math.min(deltaTime / 1000, 0.1); // Cap delta to prevent spikes
      const shiftPressed = keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight'];
      const moving = keys['w'] || keys['W'] || keys['s'] || keys['S'] || keys['a'] || keys['A'] || keys['d'] || keys['D'];
      
      if (shiftPressed && moving && stamina > 1) {
        // Drain stamina when sprinting + moving
        stamina = Math.max(0, stamina - staminaDrainRate * dt);
      } else if (stamina < maxStamina) {
        // Regen stamina when not sprinting
        stamina = Math.min(maxStamina, stamina + staminaRegenRate * dt);
      }
    }

    function drawArena() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#2f6b2f';
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = 0.14;
      ctx.strokeStyle = 'rgba(255,255,255,.18)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 48) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 48) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      ctx.shadowColor = 'rgba(0,0,0,0.45)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#b45309';
      for (const wall of walls) ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
      ctx.shadowBlur = 0;
    }

    function drawCircle(obj, label, glow) {
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, obj.x, obj.y + 1);
      ctx.restore();
    }

    function drawFloatingText(obj, text, color = 'white') {
      const y = obj.y - obj.r - 26;
      if (y < 20) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, obj.x, y);
      ctx.restore();
    }

    function updateCountdown() {
      if (tagCountdown > 0) {
        const elapsed = (now - tagCountdownElapsed) / 1000;
        if (elapsed >= 1) {
          tagCountdown--;
          tagCountdownElapsed = now;
          if (tagCountdown === 0) {
            if (tagger === 'player') player.frozen = false;
            else bot.frozen = false;
          }
        }
      }
    }

    function drawHudText() {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = '700 18px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const label = tagger === 'player' ? 'YOU ARE TAGGER' : 'BOT IS TAGGER';
      ctx.fillText(label, 18, 64);
      ctx.font = '14px Arial';
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillText('Tag the other player to switch tagger.', 18, 86);
      ctx.fillText('Hold Shift to sprint!', 18, 106);
    }

    function updatePlayer(deltaTime) {
      if (player.frozen) return;
      let dx = 0, dy = 0;
      const shiftPressed = keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight'];
      const canSprint = shiftPressed && stamina > 1;
      const speed = canSprint ? player.speed * sprintMultiplier : player.speed;
      
      if (keys['w'] || keys['W']) dy -= speed;
      if (keys['s'] || keys['S']) dy += speed;
      if (keys['a'] || keys['A']) dx -= speed;
      if (keys['d'] || keys['D']) dx += speed;
      
      moveWithWalls(player, dx * (deltaTime / 16), dy * (deltaTime / 16));
    }

    function updateBot(deltaTime) {
      if (bot.frozen) return;
      if (now - lastPathTime > PATH_UPDATE_MS) {
        updateBotTarget();
        lastPathTime = now;
      }
      const dir = getBestDirection(pathTarget.x, pathTarget.y);
      const smooth = 0.18;
      bot.vx = (bot.vx || 0) + (dir.dx - (bot.vx || 0)) * smooth;
      bot.vy = (bot.vy || 0) + (dir.dy - (bot.vy || 0)) * smooth;
      const len = Math.hypot(bot.vx, bot.vy) || 1;
      bot.vx /= len;
      bot.vy /= len;
      moveWithWalls(bot, bot.vx * bot.speed * (deltaTime / 16), bot.vy * bot.speed * (deltaTime / 16));
      const movedDist = Math.hypot(bot.x - prevBotPos.x, bot.y - prevBotPos.y);
      stuckCounter = movedDist < 0.5 ? stuckCounter + 1 : 0;
      if (stuckCounter > STUCK_THRESHOLD) {
        updateBotTarget();
        bot.vx = (Math.random() - 0.5) * 2;
        bot.vy = (Math.random() - 0.5) * 2;
        stuckCounter = 0;
      }
      prevBotPos.x = bot.x;
      prevBotPos.y = bot.y;
    }

    function checkCollisions() {
      if ((tagger === 'player' && player.frozen) || (tagger === 'bot' && bot.frozen)) return;
      if (dist(player, bot) < player.r + bot.r) {
        tagger = tagger === 'player' ? 'bot' : 'player';
        if (tagger === 'player') score++;
        else taggerScore++;
        setTagger();
        if (tagger === 'player') {
          player.frozen = true;
          bot.frozen = false;
        } else {
          player.frozen = false;
          bot.frozen = true;
        }
        tagCountdown = 2;
        tagCountdownElapsed = now;
      }
    }

    function loop(time) {
      now = time;
      const deltaTime = time - lastTime;
      lastTime = time;

      if (running && !gameOver) {
        if (time - lastSecondTick >= 1000) {
          timer--;
          lastSecondTick += 1000;
          if (timer <= 0) {
            timer = 0;
            gameOver = true;
            running = false;
            centerMsg.style.display = 'grid';
            centerMsg.querySelector('.box').innerHTML = `
              <h1 style="margin:0 0 8px;">Time's Up</h1>
              <div>You: ${score}</div>
              <div>Bot: ${taggerScore}</div>
              <div style="margin-top:10px;">Press Restart to play again.</div>
            `;
            startBtn.style.display = 'none';
            restartBtn.style.display = 'inline-flex';
          }
        }

        updateStamina(deltaTime);
        updatePlayer(deltaTime);
        updateBot(deltaTime);
        checkCollisions();
        updateCountdown();

        drawArena();
        drawHudText();
        drawCircle(player, 'YOU', '#22c55e');
        drawCircle(bot, 'BOT', '#ef4444');
        if (tagCountdown > 0) {
          const frozenObj = tagger === 'player' ? player : bot;
          drawFloatingText(frozenObj, tagCountdown, '#f59e0b');
        }
        updateUI();
      }

      requestAnimationFrame(loop);
    }

    // Fixed keyboard event listeners - now handles Space/Enter properly
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      keys[e.key] = true; // Also store original key for Shift
      
      // Handle Enter/Space to start game when not running
      if (!running && !gameOver && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        startGame();
        return;
      }
      
      // Prevent space scrolling
      if (e.key === ' ') {
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
      keys[e.key] = false;
    });

    // Button event listeners with proper keyboard support
    startBtn.addEventListener('click', startGame);
    
    startBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startGame();
      }
    });

    restartBtn.addEventListener('click', () => {
      running = false;
      gameOver = false;
      centerMsg.style.display = 'grid';
      resetGame();
      centerMsg.querySelector('.box').innerHTML = `
        <h1 style="margin:0 0 8px;">TAG on G+</h1>
        <div>Use WASD + Shift to sprint (uses stamina).</div>
        <div>Either side can be tagger. Tag the other to switch.</div>
        <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
      `;
      startBtn.style.display = 'inline-flex';
      restartBtn.style.display = 'inline-flex';
    });

    restartBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        restartBtn.click();
      }
    });

    window.addEventListener('resize', resize);
    document.addEventListener('contextmenu', e => e.preventDefault());

    resize();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
