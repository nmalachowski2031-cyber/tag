<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #0f172a);
      font-family: Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #staminaPanel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #staminaBar {
      width: 120px;
      height: 8px;
      background: rgba(30, 58, 138, 0.8);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
    }
    #staminaFill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 100%;
      transition: width 0.1s ease;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.15), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,.12), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(34,197,94,.10), transparent 25%),
        #0b1020;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
    button:hover { box-shadow: 0 12px 28px rgba(37,99,235,.35); }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
    <div class="panel" id="staminaPanel">
      <div style="font-size: 11px; opacity: 0.9;">Stamina</div>
      <div id="staminaBar">
        <div id="staminaFill"></div>
      </div>
    </div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+</h1>
      <div>Use WASD + Shift to sprint (uses stamina).</div>
      <div>Either side can be tagger. Tag the other to switch.</div>
      <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn">START</button>
    <button class="secondary" id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const staminaFill = document.getElementById('staminaFill');
    const centerMsg = document.getElementById('centerMsg');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;

    // Game objects
    const playerBase = 4.5;
    const botBase = 3.8;
    const playerTaggerBoost = 1.25;
    const botTaggerBoost = 1.65;
    const sprintMultiplier = 1.8;
    const maxStamina = 100;
    let stamina = maxStamina;
    let staminaRegenRate = 25; // per second
    let staminaDrainRate = 60; // per second when sprinting
    let lastStaminaUpdate = 0;

    const player = { x: 0, y: 0, r: 16, base: playerBase, speed: playerBase, color: '#22c55e', frozen: false };
    const bot = { x: 0, y: 0, r: 16, base: botBase, speed: botBase, color: '#ef4444', frozen: false };

    // Walls
    const walls = [
      {x: 150, y: 100, w: 20, h: 200},
      {x: 250, y: 300, w: 20, h: 150},
      {x: window.innerWidth - 300, y: 120, w: 20, h: 180},
      {x: window.innerWidth - 170, y: 320, w: 20, h: 160},
      {x: window.innerWidth/2 - 50, y: 80, w: 100, h: 20},
      {x: window.innerWidth/2 - 30, y: window.innerHeight - 120, w: 60, h: 20}
    ];

    let tagCountdown = 0;
    let tagCountdownElapsed = 0;
    let tagger = 'bot';

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      // Update wall positions on resize
      walls[2].x = window.innerWidth - 300;
      walls[3].x = window.innerWidth - 170;
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      gameOver = false;
      stamina = maxStamina;
      player.x = window.innerWidth * 0.25;
      player.y = window.innerHeight * 0.5;
      bot.x = window.innerWidth * 0.75;
      bot.y = window.innerHeight * 0.5;
      tagCountdown = 0;
      tagCountdownElapsed = 0;
      tagger = 'bot';
      player.frozen = false;
      bot.frozen = false;
      setTagger();
      centerMsg.style.display = running ? 'none' : 'grid';
      if (!running) {
        centerMsg.querySelector('.box').innerHTML = `
          <h1 style="margin:0 0 8px;">TAG on G+</h1>
          <div>Use WASD + Shift to sprint (uses stamina).</div>
          <div>Either side can be tagger. Tag the other to switch.</div>
          <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
        `;
      }
      updateUI();
    }

    function setTagger() {
      if (tagger === 'player') {
        player.color = '#f59e0b';
        bot.color = '#ef4444';
        player.speed = player.base * playerTaggerBoost;
        bot.speed = bot.base;
      } else {
        player.color = '#22c55e';
        bot.color = '#f59e0b';
        player.speed = player.base;
        bot.speed = bot.base * botTaggerBoost;
      }
    }

    function startGame() {
      if (running || gameOver) return;
      running = true;
      centerMsg.style.display = 'none';
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${Math.max(0, timer)}`;
      staminaFill.style.width = (stamina / maxStamina * 100) + '%';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function rectCircleCollide(rect, circle) {
      const dx = circle.x - Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const dy = circle.y - Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      return (dx * dx + dy * dy) < (circle.r * circle.r);
    }

    function resolveWallCollisions(obj) {
      for (let wall of walls) {
        if (rectCircleCollide(wall, obj)) {
          // Simple push-back collision response
          const dx = obj.x - (wall.x + wall.w / 2);
          const dy = obj.y - (wall.y + wall.h / 2);
          const distToWall = Math.hypot(dx, dy);
          if (distToWall < obj.r) {
            const overlap = obj.r - distToWall;
            obj.x += (dx / distToWall) * overlap;
            obj.y += (dy / distToWall) * overlap;
          }
        }
      }
    }

    function keepInBounds(obj) {
      obj.x = Math.max(obj.r, Math.min(window.innerWidth - obj.r, obj.x));
      obj.y = Math.max(obj.r, Math.min(window.innerHeight - obj.r, obj.y));
    }

    function updateStamina(deltaTime) {
      const dt = deltaTime / 1000;
      const isSprinting = keys['Shift'] && stamina > 0;
      
      if (isSprinting) {
        stamina = Math.max(0, stamina - staminaDrainRate * dt);
      } else if (stamina < maxStamina) {
        stamina = Math.min(maxStamina, stamina + staminaRegenRate * dt);
      }
    }

    function drawArena() {
      ctx.clearRect(0, 0, W, H);
      const grid = 48;
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#93c5fd';
      ctx.lineWidth = 1;
      for (let x = 0; x < window.innerWidth; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x * devicePixelRatio, 0);
        ctx.lineTo(x * devicePixelRatio, window.innerHeight * devicePixelRatio);
        ctx.stroke();
      }
      for (let y = 0; y < window.innerHeight; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y * devicePixelRatio);
        ctx.lineTo(window.innerWidth * devicePixelRatio, y * devicePixelRatio);
        ctx.stroke();
      }
      
      // Draw walls
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(75, 85, 99, 0.85)';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 12;
      for (let wall of walls) {
        ctx.fillRect(wall.x * devicePixelRatio, wall.y * devicePixelRatio, 
                     wall.w * devicePixelRatio, wall.h * devicePixelRatio);
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function drawCircle(obj, label, glow) {
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x * devicePixelRatio, obj.y * devicePixelRatio, obj.r * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = `${14 * devicePixelRatio}px bold Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, obj.x * devicePixelRatio, (obj.y + 5) * devicePixelRatio);
      ctx.restore();
    }

    function drawFloatingText(obj, text, color = 'white') {
      const y = obj.y - obj.r - 26;
      if (y < 20) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `${18 * devicePixelRatio}px bold Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, obj.x * devicePixelRatio, y * devicePixelRatio);
      ctx.restore();
    }

    function updateCountdown() {
      if (tagCountdown > 0) {
        const elapsed = (now - tagCountdownElapsed) / 1000;
        if (elapsed >= 1) {
          tagCountdown--;
          tagCountdownElapsed = now;
          if (tagCountdown === 0) {
            player.frozen = false;
            bot.frozen = false;
          }
        }
      }
    }

    function drawTaggerLabel(obj) {
      if (tagCountdown > 0) drawFloatingText(obj, tagCountdown, '#f59e0b');
    }

    function drawHudText() {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = `${18 * devicePixelRatio}px 700 Arial`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const label = tagger === 'player' ? 'YOU ARE TAGGER' : 'BOT IS TAGGER';
      ctx.fillText(label, 18 * devicePixelRatio, 64 * devicePixelRatio);
      ctx.font = `${14 * devicePixelRatio}px Arial`;
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillText('Tag the other player to switch tagger.', 18 * devicePixelRatio, 86 * devicePixelRatio);
      ctx.fillText('Hold Shift to sprint!', 18 * devicePixelRatio, 106 * devicePixelRatio);
    }

    function updatePlayer(deltaTime) {
      if (player.frozen) return;
      
      let tx = 0, ty = 0;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) tx -= 1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) tx += 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) ty -= 1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) ty += 1;
      
      const len = Math.hypot(tx, ty) || 1;
      const speedMultiplier = (keys['Shift'] && stamina > 5) ? sprintMultiplier : 1;
      
      player.x += (tx / len) * player.speed * speedMultiplier * (deltaTime / 16.67);
      player.y += (ty / len) * player.speed * speedMultiplier * (deltaTime / 16.67);
      
      resolveWallCollisions(player);
      keepInBounds(player);
    }

    const lookSmooth = { angle: 0 };

    function updateBot() {
      if (bot.frozen) return;
      let angle = Math.atan2(player.y - bot.y, player.x - bot.x);
      if (tagger === 'player') angle += Math.PI;
      let diff = angle - lookSmooth.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      lookSmooth.angle += diff * 0.15;
      bot.x += Math.cos(lookSmooth.angle) * bot.speed * (16.67 / 16.67);
      bot.y += Math.sin(lookSmooth.angle) * bot.speed * (16.67 / 16.67);
      
      resolveWallCollisions(bot);
      keepInBounds(bot);
    }

    function handleTagging() {
      if (tagCountdown > 0) return;
      if (dist(player, bot) < player.r + bot.r) {
        if (tagger === 'bot') {
          tagger = 'player';
          taggerScore++;
          player.frozen = true;
          bot.frozen = false;
        } else {
          tagger = 'bot';
          score++;
          bot.frozen = true;
          player.frozen = false;
        }
        setTagger();
        tagCountdown = 3;
        tagCountdownElapsed = now;
      }
    }

    function loop(time) {
      now = time;
      if (!running) return;
      
      const deltaTime = now - lastTime;
      lastTime = now;

      if (!gameOver) {
        if (now - lastSecondTick >= 1000) {
          timer--;
          lastSecondTick = now;
          if (timer <= 0) {
            gameOver = true;
            centerMsg.style.display = 'grid';
            centerMsg.querySelector('.box').innerHTML = `
              <h1 style="margin:0 0 8px;">Game Over</h1>
              <div>Final score: ${score}</div>
              <div>Tags held: ${taggerScore}</div>
              <div style="margin-top:10px;">Press START or Restart.</div>
            `;
          }
          updateUI();
        }

        updateStamina(deltaTime);
        updateCountdown();
        updatePlayer(deltaTime);
        updateBot();
        handleTagging();
      }

      drawArena();
      drawCircle(bot, 'BOT', tagger === 'bot' ? 'rgba(245,158,11,.55)' : 'rgba(239,68,68,.55)');
      drawCircle(player, 'YOU', tagger === 'player' ? 'rgba(245,158,11,.55)' : 'rgba(34,197,94,.55)');
      if (tagger === 'player') drawTaggerLabel(player);
      else drawTaggerLabel(bot);
      drawHudText();

      updateUI();
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      running = false;
      gameOver = false;
      resetGame();
    });

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['Enter', ' '].includes(e.key) && !running && !gameOver) {
        e.preventDefault();
        startGame();
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','Shift'].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    window.addEventListener('resize', () => {
      resize();
      if (player.x || player.y) {
        keepInBounds(player);
        keepInBounds(bot);
        // Update right-side walls
        walls[2].x = window.innerWidth - 300;
        walls[3].x = window.innerWidth - 170;
      }
    });

    resize();
    resetGame();
    lastSecondTick = performance.now();
  </script>
</body>
</html>
