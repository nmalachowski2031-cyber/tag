<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+ 🏰 MAZE</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2f6b2f 0%, #1e4621 100%);
      font-family: Arial, sans-serif;
      user-select: none;
    }
    #mainMenu {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 25;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
    }
    .menuBox {
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(245,158,11,0.3);
    }
    .menuTitle {
      color: #f59e0b;
      font-size: 36px;
      margin: 0 0 24px;
      text-shadow: 0 0 20px rgba(245,158,11,0.8);
      letter-spacing: 2px;
    }
    .menuBtn {
      display: block;
      width: 280px;
      margin: 16px auto;
      padding: 18px 24px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    }
    .mainBtn { background: linear-gradient(45deg, #10b981, #34d399); color: white; }
    .mainBtn:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(16,185,129,0.6); }
    .player2Btn { background: linear-gradient(45deg, #6b7280, #9ca3af); color: white; opacity: 0.7; }

    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 15;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #staminaPanel { display: flex; flex-direction: column; gap: 6px; }
    #staminaBar {
      width: 120px; height: 8px; background: rgba(30, 58, 138, 0.8);
      border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.2);
    }
    #staminaFill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 100%;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #2f6b2f;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 20;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
    }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
  </style>
</head>
<body>
  <div id="mainMenu">
    <div class="menuBox">
      <h1 class="menuTitle">TAG on G+ 🏰</h1>
      <p style="color:#94a3b8;margin:0 0 32px;font-size:16px;">Choose your game mode</p>
      <button class="menuBtn mainBtn" id="mainBtn" type="button">MAIN (1P vs AI)</button>
      <button class="menuBtn player2Btn" id="player2Btn" type="button" disabled>2 PLAYER (COMING SOON)</button>
      <p style="color:#64748b;margin-top:24px;font-size:12px;">Press 1 = MAIN | Press 2 = 2P</p>
    </div>
  </div>

  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
    <div class="panel" id="staminaPanel">
      <div style="font-size:11px;opacity:0.9;">Stamina</div>
      <div id="staminaBar"><div id="staminaFill"></div></div>
    </div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+ 🏰 MAZE</h1>
      <div>🔥 BETTER MAZE - wider paths + smart loops!</div>
      <div>Use WASD + Shift to sprint (stamina).</div>
      <div>Tag to switch roles. Outsmart the bot!</div>
      <div style="margin-top:10px;">Press Enter/Space or START</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn" tabindex="0" type="button">START</button>
    <button class="secondary" id="restartBtn" tabindex="0" type="button" style="display:none;">RESTART</button>
  </div>

  <script>
    const mainMenu = document.getElementById('mainMenu');
    const mainBtn = document.getElementById('mainBtn');
    const player2Btn = document.getElementById('player2Btn');
    const centerMsg = document.getElementById('centerMsg');
    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const staminaFill = document.getElementById('staminaFill');

    let running = false, gameOver = false, timer = 60, score = 0, taggerScore = 0, stamina = 100;
    let gameStarted = false;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${timer}`;
      staminaFill.style.width = stamina + '%';
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      stamina = 100;
      updateUI();
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#2f6b2f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      for (let i = 0; i < 40; i++) {
        ctx.fillRect((i * 97) % canvas.width, (i * 53) % canvas.height, 22, 22);
      }
    }

    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      mainMenu.style.display = 'none';
      ui.style.display = 'flex';
      centerMsg.style.display = 'grid';
      startBtn.style.display = 'none';
      restartBtn.style.display = 'inline-flex';
      running = true;
      gameOver = false;
      resetGame();
      draw();
    }

    mainBtn.addEventListener('click', startGame);
    startBtn.addEventListener('click', startGame);

    restartBtn.addEventListener('click', () => {
      gameStarted = false;
      mainMenu.style.display = 'grid';
      ui.style.display = 'none';
      centerMsg.style.display = 'none';
      startBtn.style.display = 'inline-flex';
      restartBtn.style.display = 'none';
      resetGame();
    });

    player2Btn.addEventListener('click', () => alert('2 Player mode coming soon! Press MAIN for 1P vs AI'));

    document.addEventListener('keydown', (e) => {
      if (mainMenu.style.display !== 'none' && (e.key === '1' || e.key === 'Enter' || e.key === ' ')) {
        startGame();
        e.preventDefault();
      }
    });

    window.addEventListener('resize', resize);
    resize();
    resetGame();
  </script>
</body>
</html>
