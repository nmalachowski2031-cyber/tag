<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAG on G+ 🏰 MAZE - FIXED START BUTTON</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      overflow: hidden;
      background: #1a3c1a;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    canvas { display: block; width: 100%; height: 100%; }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      color: white;
      font-weight: bold;
      font-size: 20px;
      text-shadow: 2px 2px 4px black;
      pointer-events: none;
      z-index: 100;
    }
    
    #menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    
    #menu h1 {
      color: #ffd700;
      font-size: 48px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #ffd700;
    }
    
    #startButton {
      background: linear-gradient(45deg, #ff4444, #ff6666);
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 32px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255,68,68,0.5);
      transition: all 0.3s;
    }
    
    #startButton:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 40px rgba(255,68,68,0.7);
    }
    
    #instructions {
      color: #ccc;
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
    }
    
    #restart {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #666;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 30px;
      cursor: pointer;
      display: none;
      z-index: 150;
    }
  </style>
</head>
<body>
  <div id="ui" style="display: none;">
    <div>Score: <span id="playerScore">0</span></div>
    <div>Time: <span id="gameTime">60</span></div>
    <div>Stamina: <span id="stamina">100</span>%</div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <div id="menu">
    <h1>🏰 TAG MAZE</h1>
    <button id="startButton">🚀 START GAME</button>
    <div id="instructions">
      WASD to move • SHIFT to sprint • Tag the orange bot!
    </div>
  </div>
  
  <button id="restart">🔄 Restart</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startButton = document.getElementById('startButton');
    const menu = document.getElementById('menu');
    const ui = document.getElementById('ui');
    const restart = document.getElementById('restart');
    
    // Game state
    let gameRunning = false;
    let W, H;
    let score = 0;
    let timeLeft = 60;
    let stamina = 100;
    let keys = {};
    
    let player = { x: 100, y: 100, vx: 0, vy: 0, r: 20 };
    let enemy = { x: 400, y: 400, vx: 0, vy: 0, r: 20 };
    
    // Resize
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      player.x = Math.min(100, W * 0.1);
      player.y = Math.min(100, H * 0.1);
      enemy.x = Math.max(W - 100, W * 0.9);
      enemy.y = Math.max(H - 100, H * 0.9);
    }
    
    // Update UI
    function updateUI() {
      document.getElementById('playerScore').textContent = score;
      document.getElementById('gameTime').textContent = Math.ceil(timeLeft);
      document.getElementById('stamina').textContent = Math.floor(stamina);
    }
    
    // Reset game
    function reset() {
      score = 0;
      timeLeft = 60;
      stamina = 100;
      player.x = 100; player.y = 100;
      enemy.x = 400; enemy.y = 400;
      player.vx = player.vy = 0;
      enemy.vx = enemy.vy = 0;
      updateUI();
    }
    
    // Game loop
    function loop(time) {
      const dt = 0.016; // 60fps
      
      if (gameRunning) {
        // Timer
        timeLeft -= dt;
        if (timeLeft <= 0) {
          gameRunning = false;
          alert('Game Over! Score: ' + score);
          showMenu();
          return;
        }
        
        // Player input
        let speed = keys['shift'] && stamina > 10 ? 500 : 300;
        player.vx *= 0.9;
        player.vy *= 0.9;
        if (keys['w']) player.vy -= speed;
        if (keys['s']) player.vy += speed;
        if (keys['a']) player.vx -= speed;
        if (keys['d']) player.vx += speed;
        
        // Update player position
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        player.x = Math.max(player.r, Math.min(W - player.r, player.x));
        player.y = Math.max(player.r, Math.min(H - player.r, player.y));
        
        // Stamina
        if (keys['shift']) stamina = Math.max(0, stamina - 200 * dt);
        else stamina = Math.min(100, stamina + 150 * dt);
        
        // Enemy AI
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 50) {
          enemy.vx += (dx/dist) * 100 * dt;
          enemy.vy += (dy/dist) * 100 * dt;
        }
        enemy.vx *= 0.95;
        enemy.vy *= 0.95;
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.x = Math.max(enemy.r, Math.min(W - enemy.r, enemy.x));
        enemy.y = Math.max(enemy.r, Math.min(H - enemy.r, enemy.y));
        
        // Collision
        const pdx = player.x - enemy.x;
        const pdy = player.y - enemy.y;
        const pdist = Math.sqrt(pdx*pdx + pdy*pdy);
        if (pdist < player.r + enemy.r) {
          score++;
          updateUI();
          // Knockback
          const kb = 60;
          player.x += (pdx/pdist) * kb;
          player.y += (pdy/pdist) * kb;
          enemy.x -= (pdx/pdist) * kb;
          enemy.y -= (pdy/pdist) * kb;
        }
      }
      
      // Render
      ctx.fillStyle = '#1a3c1a';
      ctx.fillRect(0, 0, W, H);
      
      // Maze grid
      ctx.strokeStyle = 'rgba(3a6a3a, 0.5)';
      ctx.lineWidth = 3;
      for (let x = 0; x < W; x += 120) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 100) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      
      // Player
      ctx.fillStyle = '#4f94ff';
      ctx.shadowColor = '#4f94ff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
      ctx.fill();
      
      // Enemy
      ctx.fillStyle = '#ffaa00';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      updateUI();
      requestAnimationFrame(loop);
    }
    
    // Show menu
    function showMenu() {
      menu.style.display = 'flex';
      ui.style.display = 'none';
      restart.style.display = 'none';
      gameRunning = false;
    }
    
    // Start game
    function startGame() {
      console.log('START GAME CLICKED!');
      menu.style.display = 'none';
      ui.style.display = 'flex';
      restart.style.display = 'block';
      gameRunning = true;
      reset();
    }
    
    // Event listeners
    startButton.onclick = startGame;
    restart.onclick = function() {
      console.log('RESTART CLICKED!');
      showMenu();
    };
    
    document.onkeydown = function(e) {
      keys[e.key.toLowerCase()] = true;
      if (!gameRunning && e.key === ' ') {
        e.preventDefault();
        startGame();
      }
    };
    
    document.onkeyup = function(e) {
      keys[e.key.toLowerCase()] = false;
    };
    
    // Initialize
    window.onload = function() {
      resize();
      loop(0);
      console.log('GAME LOADED - Click START or press SPACE');
    };
    
    window.onresize = resize;
  </script>
</body>
</html>
