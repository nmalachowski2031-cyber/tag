<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG on G+ 🏰 MAZE</title>

<style>
* { box-sizing: border-box; }
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#2f6b2f;
}

#game {
  width:100vw;
  height:100vh;
  display:block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W=0,H=0;

let player = {x:100,y:100,r:14,speed:4};
let bot = {x:400,y:300,r:14,speed:3};

let tagger = "bot";
let score = 0;
let botScore = 0;

let walls = [];

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  buildMaze();
}
window.addEventListener("resize", resize);

function wall(x,y,w,h){
  return {x:x*W,y:y*H,w:w*W,h:h*H};
}

function buildMaze(){
  walls = [];

  // border
  walls.push(wall(0,0,1,0.02));
  walls.push(wall(0,0.98,1,0.02));
  walls.push(wall(0,0,0.02,1));
  walls.push(wall(0.98,0,0.02,1));

  // simple clean maze (no fake "cut gaps")
  walls.push(wall(0.2,0.1,0.02,0.7));
  walls.push(wall(0.4,0.2,0.02,0.7));
  walls.push(wall(0.6,0.1,0.02,0.7));
  walls.push(wall(0.8,0.2,0.02,0.7));

  walls.push(wall(0.1,0.3,0.7,0.02));
  walls.push(wall(0.2,0.5,0.7,0.02));
  walls.push(wall(0.1,0.7,0.7,0.02));
}

function collideCircleRect(c,r){
  let cx = Math.max(r.x, Math.min(c.x, r.x+r.w));
  let cy = Math.max(r.y, Math.min(c.y, r.y+r.h));
  let dx = c.x-cx;
  let dy = c.y-cy;
  return dx*dx+dy*dy < c.r*c.r;
}

function move(obj,dx,dy){
  obj.x += dx;
  for(let w of walls){
    if(collideCircleRect(obj,w)){
      obj.x -= dx;
      break;
    }
  }
  obj.y += dy;
  for(let w of walls){
    if(collideCircleRect(obj,w)){
      obj.y -= dy;
      break;
    }
  }
}

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
  let dx=0,dy=0;

  if(keys["w"]) dy-=player.speed;
  if(keys["s"]) dy+=player.speed;
  if(keys["a"]) dx-=player.speed;
  if(keys["d"]) dx+=player.speed;

  move(player,dx,dy);

  // bot basic chase
  let angle = Math.atan2(player.y-bot.y, player.x-bot.x);
  move(bot, Math.cos(angle)*bot.speed, Math.sin(angle)*bot.speed);

  // collision/tag logic (FIXED SCORING)
  let dist = Math.hypot(player.x-bot.x, player.y-bot.y);

  if(dist < player.r + bot.r){
    if(tagger === "player"){
      score++;          // player tagged bot
      tagger = "bot";
    } else {
      botScore++;       // bot tagged player
      tagger = "player";
    }
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // walls
  ctx.fillStyle = "#b45309";
  for(let w of walls){
    ctx.fillRect(w.x,w.y,w.w,w.h);
  }

  // player
  ctx.fillStyle = tagger==="player" ? "orange" : "lime";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  // bot
  ctx.fillStyle = tagger==="bot" ? "orange" : "red";
  ctx.beginPath();
  ctx.arc(bot.x,bot.y,bot.r,0,Math.PI*2);
  ctx.fill();

  // score
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("You: "+score+" | Bot: "+botScore,20,30);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

resize();
loop();
</script>

</body>
</html>
