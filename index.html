<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAG on G+</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #0f172a);
      font-family: Arial, sans-serif;
      user-select: none;
      touch-action: none;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      color: white;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
    }
    #staminaPanel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #staminaBar {
      width: 120px;
      height: 8px;
      background: rgba(30, 58, 138, 0.8);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
    }
    #staminaFill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 100%;
      transition: width 0.1s ease;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,.15), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,.12), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(34,197,94,.10), transparent 25%),
        #0b1020;
    }
    #centerMsg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      z-index: 12;
      pointer-events: none;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #centerMsg .box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px 22px;
      max-width: 520px;
    }
    .btnRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,.25);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #334155; box-shadow: 0 10px 24px rgba(51,65,85,.25); }
    button:hover { box-shadow: 0 12px 28px rgba(37,99,235,.35); }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="scoreBox">You: 0 | Tagger: 0</div>
    <div class="panel" id="timeBox">Time: 60</div>
    <div class="panel" id="staminaPanel">
      <div style="font-size: 11px; opacity: 0.9;">Stamina</div>
      <div id="staminaBar">
        <div id="staminaFill"></div>
      </div>
    </div>
  </div>

  <div id="centerMsg">
    <div class="box">
      <h1 style="margin:0 0 8px;">TAG on G+</h1>
      <div>Use WASD + Shift to sprint (uses stamina).</div>
      <div>Either side can be tagger. Tag the other to switch.</div>
      <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="btnRow">
    <button id="startBtn">START</button>
    <button class="secondary" id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBox = document.getElementById('scoreBox');
    const timeBox = document.getElementById('timeBox');
    const staminaFill = document.getElementById('staminaFill');
    const centerMsg = document.getElementById('centerMsg');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let W = 0, H = 0, running = false, gameOver = false;
    let lastTime = 0, timer = 60, lastSecondTick = 0;
    let keys = {};
    let score = 0;
    let taggerScore = 0;
    let now = 0;

    // Game objects
    const playerBase = 4.5;
    const botBase = 3.8;
    const playerTaggerBoost = 1.25;
    const botTaggerBoost = 1.65;
    const sprintMultiplier = 1.8;
    const maxStamina = 100;
    let stamina = maxStamina;
    let staminaRegenRate = 25;
    let staminaDrainRate = 60;

    const player = { x: 0, y: 0, r: 16, base: playerBase, speed: playerBase, color: '#22c55e', frozen: false };
    const bot = { x: 0, y: 0, r: 16, base: botBase, speed: botBase, color: '#ef4444', frozen: false };

    // Walls
    let walls = [
      {x: 150, y: 100, w: 20, h: 200},
      {x: 250, y: 300, w: 20, h: 150},
      {x: 0, y: 0, w: 20, h: 0},
      {x: 0, y: 0, w: 20, h: 0},
      {x: 0, y: 0, w: 100, h: 20},
      {x: 0, y: 0, w: 60, h: 20}
    ];

    let tagCountdown = 0;
    let tagCountdownElapsed = 0;
    let tagger = 'bot';

    // SMOOTH STABLE BOT AI - NO SPINNING, NO STUCK
    let botAngle = 0;
    let botTargetAngle = 0;
    let pathTarget = { x: 0, y: 0 };
    let lastPathTime = 0;
    let stuckCounter = 0;
    let prevBotPos = { x: 0, y: 0 };

    const PATH_UPDATE_MS = 300;
    const LOOKAHEAD_DIST = 80;
    const STUCK_THRESHOLD = 3;

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      
      walls[2].x = window.innerWidth - 300; walls[2].y = 120; walls[2].w = 20; walls[2].h = 180;
      walls[3].x = window.innerWidth - 170; walls[3].y = 320; walls[3].w = 20; walls[3].h = 160;
      walls[4].x = window.innerWidth/2 - 50; walls[4].y = 80;
      walls[5].x = window.innerWidth/2 - 30; walls[5].y = window.innerHeight - 120;
    }

    function circleRectCollide(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function moveWithWalls(obj, dx, dy) {
      obj.x += dx;
      for (const wall of walls) {
        if (circleRectCollide(obj, wall)) {
          obj.x -= dx;
          break;
        }
      }
      obj.y += dy;
      for (const wall of walls) {
        if (circleRectCollide(obj, wall)) {
          obj.y -= dy;
          break;
        }
      }
      obj.x = Math.max(obj.r, Math.min(window.innerWidth - obj.r, obj.x));
      obj.y = Math.max(obj.r, Math.min(window.innerHeight - obj.r, obj.y));
    }

    function isPositionSafe(x, y) {
      const test = { x, y, r: 16 };
      for (const wall of walls) {
        if (circleRectCollide(test, wall)) return false;
      }
      return true;
    }

    function getBestDirection(targetX, targetY) {
      const dirs = [
        {dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1},
        {dx: 0.7, dy: 0.7}, {dx: 0.7, dy: -0.7}, {dx: -0.7, dy: 0.7}, {dx: -0.7, dy: -0.7}
      ];
      
      let bestDir = dirs[0];
      let bestScore = -Infinity;
      
      for (let dir of dirs) {
        const testX = bot.x + dir.dx * LOOKAHEAD_DIST;
        const testY = bot.y + dir.dy * LOOKAHEAD_DIST;
        
        if (isPositionSafe(testX, testY)) {
          const distToTarget = Math.hypot(testX - targetX, testY - targetY);
          const score = -distToTarget - Math.abs(dir.dx * (targetX - bot.x) + dir.dy * (targetY - bot.y)) * 0.1;
          
          if (score > bestScore) {
            bestScore = score;
            bestDir = dir;
          }
        }
      }
      
      return bestDir;
    }

    function updateBotTarget() {
      let targetX = player.x;
      let targetY = player.y;
      
      if (tagger === 'bot') {
        // Chase with lookahead
        targetX += (Math.random() - 0.5) * 20; // slight randomness
        targetY += (Math.random() - 0.5) * 20;
      } else {
        // Flee from player
        const fleeX = bot.x + (bot.x - player.x) * 0.8;
        const fleeY = bot.y + (bot.y - player.y) * 0.8;
        targetX = fleeX;
        targetY = fleeY;
      }
      
      pathTarget.x = targetX;
      pathTarget.y = targetY;
    }

    function resetGame() {
      score = 0;
      taggerScore = 0;
      timer = 60;
      gameOver = false;
      stamina = maxStamina;
      player.x = window.innerWidth * 0.25;
      player.y = window.innerHeight * 0.5;
      bot.x = window.innerWidth * 0.75;
      bot.y = window.innerHeight * 0.5;
      tagCountdown = 0;
      tagCountdownElapsed = 0;
      tagger = 'bot';
      player.frozen = false;
      bot.frozen = false;
      
      // Reset bot AI
      botAngle = 0;
      botTargetAngle = 0;
      pathTarget = { x: 0, y: 0 };
      lastPathTime = 0;
      stuckCounter = 0;
      prevBotPos = { x: bot.x, y: bot.y };
      
      setTagger();
      centerMsg.style.display = running ? 'none' : 'grid';
      if (!running) {
        centerMsg.querySelector('.box').innerHTML = `
          <h1 style="margin:0 0 8px;">TAG on G+</h1>
          <div>Use WASD + Shift to sprint (uses stamina).</div>
          <div>Either side can be tagger. Tag the other to switch.</div>
          <div style="margin-top:10px;">Press Enter/Space or START to begin.</div>
        `;
      }
      updateUI();
    }

    function setTagger() {
      if (tagger === 'player') {
        player.color = '#f59e0b';
        bot.color = '#ef4444';
        player.speed = player.base * playerTaggerBoost;
        bot.speed = bot.base;
      } else {
        player.color = '#22c55e';
        bot.color = '#f59e0b';
        player.speed = player.base;
        bot.speed = bot.base * botTaggerBoost;
      }
    }

    function startGame() {
      if (running || gameOver) return;
      running = true;
      centerMsg.style.display = 'none';
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateUI() {
      scoreBox.textContent = `You: ${score} | Tagger: ${taggerScore}`;
      timeBox.textContent = `Time: ${Math.max(0, timer)}`;
      staminaFill.style.width = (stamina / maxStamina * 100) + '%';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function updateStamina(deltaTime) {
      const dt = deltaTime / 1000;
      const isSprinting = keys['Shift'] && stamina > 5;
      
      if (isSprinting) {
        stamina = Math.max(0, stamina - staminaDrainRate * dt);
      } else if (stamina < maxStamina) {
        stamina = Math.min(maxStamina, stamina + staminaRegenRate * dt);
      }
    }

    function drawArena() {
      ctx.clearRect(0, 0, W, H);
      
      const grid = 48;
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#93c5fd';
      ctx.lineWidth = 1;
      for (let x = 0; x < window.innerWidth; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x * devicePixelRatio, 0);
        ctx.lineTo(x * devicePixelRatio, window.innerHeight * devicePixelRatio);
        ctx.stroke();
      }
      for (let y = 0; y < window.innerHeight; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y * devicePixelRatio);
        ctx.lineTo(window.innerWidth * devicePixelRatio, y * devicePixelRatio);
        ctx.stroke();
      }
      
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(75, 85, 99, 0.85)';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 12;
      for (let wall of walls) {
        ctx.fillRect(wall.x * devicePixelRatio, wall.y * devicePixelRatio, 
                     wall.w * devicePixelRatio, wall.h * devicePixelRatio);
      }
      ctx.shadowBlur = 0;
    }

    function drawCircle(obj, label, glow) {
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x * devicePixelRatio, obj.y * devicePixelRatio, obj.r * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = `${14 * devicePixelRatio}px bold Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, obj.x * devicePixelRatio, (obj.y + 5) * devicePixelRatio);
      ctx.restore();
    }

    function drawFloatingText(obj, text, color = 'white') {
      const y = obj.y - obj.r - 26;
      if (y < 20) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `${18 * devicePixelRatio}px bold Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, obj.x * devicePixelRatio, y * devicePixelRatio);
      ctx.restore();
    }

    function updateCountdown() {
      if (tagCountdown > 0) {
        const elapsed = (now - tagCountdownElapsed) / 1000;
        if (elapsed >= 1) {
          tagCountdown--;
          tagCountdownElapsed = now;
          if (tagCountdown === 0) {
            player.frozen = false;
            bot.frozen = false;
          }
        }
      }
    }

    function drawTaggerLabel(obj) {
      if (tagCountdown > 0) drawFloatingText(obj, tagCountdown, '#f59e0b');
    }

        function drawHudText() {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = `${18 * devicePixelRatio}px 700 Arial`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const label = tagger === 'player' ? 'YOU ARE TAGGER' : 'BOT IS TAGGER';
      ctx.fillText(label, 18 * devicePixelRatio, 64 * devicePixelRatio);
      ctx.font = `${14 * devicePixelRatio}px Arial`;
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillText('Tag the other player to switch tagger.', 18 * devicePixelRatio, 86 * devicePixelRatio);
      ctx.fillText('Hold Shift to sprint!', 18 * devicePixelRatio, 106 * devicePixelRatio);
    }

    function updatePlayer(deltaTime) {
      if (player.frozen) return;
      
      let tx
